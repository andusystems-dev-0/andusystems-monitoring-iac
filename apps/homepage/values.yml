# values.yaml
#<REMOVED BY SENTINEL BOT: API_KEY — API key or token detected>cer
service:
  main:
    enabled: true
    type: ClusterIP
    ports:
      http:
        port: 80
        targetPort: 3000

# Disable ingress since we're using ClusterIP
ingress:
  main:
    enabled: false  # Disable ingress

# Controller configuration (unchanged)
controller:
  strategy: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# RBAC (unchanged)
enableRbac: false

serviceAccount:
  create: false
  name: ""

# Persistence (unchanged)
persistence:
  logs:
    enabled: true
    type: emptyDir
    mountPath: /app/config/logs

# values.yml - inline config directly in Helm values
config:
  settings:
    title: Andusystems
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 3
        header: true
      Networking:
        style: row
        columns: 3
        header: true
      Security:
        style: row
        columns: 2
        header: true
      Monitoring & Observability:
        style: row
        columns: 3
        header: true
      CI/CD & Deployment:
        style: row
        columns: 2
        header: true
    target: _blank # open links in new tab

  widgets:
    - logo:
        icon: https://cdn-icons-png.flaticon.com/512/2621/2621265.png
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: long
          hour12: true
    - openmeteo:
        label: Local Weather
        units: imperial
        cache: 5

  services:
