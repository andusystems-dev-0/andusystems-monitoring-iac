replicas: 1

admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  storageClassName: longhorn
  size: 5Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

envFromSecrets:
  - name: grafana-oidc-secret
    optional: false

ingress:
  enabled: false  # using Traefik IngressRoute instead

grafana.ini:
  server:
    root_url: https://grafana.andusystems.com
    serve_from_sub_path: false
    enable_gzip: true
  auth:
    disable_login_form: false
    oauth_auto_login: false
  auth.generic_oauth:
    enabled: true
    name: Keycloak
    allow_sign_up: true
    scopes: openid email profile roles
    auth_url: https://keycloak.andusystems.com/realms/grafana/protocol/openid-connect/auth
    token_url: https://keycloak.andusystems.com/realms/grafana/protocol/openid-connect/token
    api_url: https://keycloak.andusystems.com/realms/grafana/protocol/openid-connect/userinfo
    client_id: grafana
    client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
    role_attribute_path: "contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"
  analytics:
    reporting_enabled: false
    check_for_updates: false
  security:
    allow_embedding: false
  feature_toggles:
    enable: traceToMetrics traceToLogs correlations
  live:
    max_connections: 0

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # ── Remote: Fleetdock Cluster (VLAN 60) ──
      - name: FleetDock
        uid: fleetdock-prometheus
        type: prometheus
        url: http://10.238.60.22:9090
        access: proxy
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: FleetDock-Loki
        uid: fleetdock-loki
        type: loki
        url: http://10.238.60.23:3100
        access: proxy
      - name: FleetDock-Tempo
        uid: fleetdock-tempo
        type: tempo
        url: http://10.238.60.20:3100
        access: proxy
        jsonData:
          tracesToMetrics:
            datasourceUid: fleetdock-prometheus
            tags:
              - key: service.name
                value: service
          tracesToLogs:
            datasourceUid: fleetdock-loki
            tags:
              - key: service.name
                value: service
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: fleetdock-prometheus
      # ── Remote: Monitoring Cluster (VLAN 50) ──
      - name: Monitoring
        type: prometheus
        url: http://monitoring-kube-prometheus-prometheus.prometheus.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
          httpMethod: POST
      - name: Loki
        type: loki
        url: http://monitoring-loki.loki.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"traceID":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://monitoring-tempo.tempo.svc.cluster.local:3100
        access: proxy
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
            tags:
              - key: service.name
                value: service
          tracesToLogs:
            datasourceUid: loki
            tags:
              - key: service.name
                value: service
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
      # ── Remote: Storage Cluster (VLAN 40) ──
      - name: Storage
        uid: storage-prometheus
        type: prometheus
        url: http://10.238.40.22:9090
        access: proxy
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Storage-Loki
        uid: storage-loki
        type: loki
        url: http://10.238.40.23:3100
        access: proxy
      - name: Storage-Tempo
        uid: storage-tempo
        type: tempo
        url: http://10.238.40.20:3100
        access: proxy
        jsonData:
          tracesToMetrics:
            datasourceUid: storage-prometheus
            tags:
              - key: service.name
                value: service
          tracesToLogs:
            datasourceUid: storage-loki
            tags:
              - key: service.name
                value: service
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: storage-prometheus
      # ── Remote: Networking Cluster (VLAN 30) ──
      - name: Networking
        uid: networking-prometheus
        type: prometheus
        url: http://10.238.30.22:9090
        access: proxy
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Networking-Loki
        uid: Networking-loki
        type: loki
        url: http://10.238.30.23:3100
        access: proxy
      - name: Networking-Tempo
        uid: networking-tempo
        type: tempo
        url: http://10.238.30.20:3100
        access: proxy
        jsonData:
          tracesToMetrics:
            datasourceUid: networking-prometheus
            tags:
              - key: service.name
                value: service
          tracesToLogs:
            datasourceUid: Networking-loki
            tags:
              - key: service.name
                value: service
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: networking-prometheus
      # ── Remote: Management Cluster (VLAN 10) ──
      - name: Management
        uid: management-prometheus
        type: prometheus
        url: http://10.238.10.22:9090
        access: proxy
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Management-Loki
        uid: management-loki
        type: loki
        url: http://10.238.10.23:3100
        access: proxy
      - name: Management-Tempo
        uid: management-tempo
        type: tempo
        url: http://10.238.10.20:3100
        access: proxy
        jsonData:
          tracesToMetrics:
            datasourceUid: management-prometheus
            tags:
              - key: service.name
                value: service
          tracesToLogs:
            datasourceUid: management-loki
            tags:
              - key: service.name
                value: service
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: management-prometheus


# Pre-loaded dashboards from grafana.com
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: "Kubernetes"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37

plugins:
  - grafana-clock-panel
  - grafana-piechart-panel

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
