apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki-ingressroute
  namespace: loki
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`loki.andusystems.com`) && PathPrefix(`/`)"
      kind: Rule
      services:
        - name: monitoring-loki
          port: 3100
          namespace: loki
  tls:
    secretName: loki-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki-ingressroute-http
  namespace: loki
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`loki.andusystems.com`) && PathPrefix(`/`)"
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: loki
      services:
        - name: monitoring-loki
          port: 3100
          namespace: loki
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: loki
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: loki-tls
  namespace: loki
spec:
  secretName: loki-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - loki.andusystems.com