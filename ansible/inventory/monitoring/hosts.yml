linux:
  vars:
    ansible_ssh_private_key_file: "{{ ssh_key_path }}"
  hosts:
    monitoringctrl:
      ansible_user: "{{ ssh_user }}"
      ansible_host: "{{ control_plane_ip }}"
    monitoringwrkr0:
      ansible_user: "{{ ssh_user }}"
      ansible_host: "{{ worker_ips[0] }}"
    monitoringwrkr1:
      ansible_user: "{{ ssh_user }}"
      ansible_host: "{{ worker_ips[1] }}"

vms:
  hosts:
    monitoringctrl:
    monitoringwrkr0:
    monitoringwrkr1:

controllers:
  hosts:
    monitoringctrl:

workers:
  hosts:
    monitoringwrkr0:
    monitoringwrkr1:
