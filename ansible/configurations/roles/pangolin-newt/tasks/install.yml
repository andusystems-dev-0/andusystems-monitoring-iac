---
- name: Create newt namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: newt
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

- name: Apply Manifest
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', repo_root + '/apps/pangolin-newt/manifest.yml') | from_yaml_all | list }}"
  register: newt_secret_apply
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

- name: Find existing Newt deployments (if any)
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: newt
    label_selectors:
      - "app.kubernetes.io/name=newt"
  register: newt_deployments
  when: newt_secret_apply.changed
  environment:
    KUBECONFIG: "{{ kubeconfig }}"

- name: Rollout-restart Newt deployments to reload Secret
  kubernetes.core.k8s:
    state: patched
    api_version: apps/v1
    kind: Deployment
    namespace: newt
    name: "{{ item.metadata.name }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
  loop: "{{ newt_deployments.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  when:
    - newt_secret_apply.changed
    - newt_deployments.resources | default([]) | length > 0
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
